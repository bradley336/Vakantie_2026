<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evy's manege">
<meta name="theme-color" content="#ffd9e8">
<link rel="apple-touch-icon" href="evy-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evy's manege">
<meta name="theme-color" content="#cfeaff">
<title>Evy's manege</title>
<style>
  :root{--pink:#ff6fa1;--pink-d:#d84f80;--lila:#b79cff;--mint:#57d9b0;--cream:#fff6fb;
    --ink:#5b3a52;--ink-soft:#8a6a80;--shadow:0 8px 0 rgba(91,58,82,.16);--shadow-sm:0 5px 0 rgba(91,58,82,.14);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'ui-rounded','SF Pro Rounded',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#ffd9ec 0%,#e7d6ff 42%,#cfeaff 72%,#d6f5e6 100%);
    height:100dvh;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  button{font-family:inherit;cursor:pointer;transition:transform .06s ease;border:none;}
  button:active{transform:scale(.95);}
  :focus-visible{outline:3px solid var(--lila);outline-offset:2px;}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:65;}

  .screen{position:relative;height:100dvh;display:none;flex-direction:column;}
  .screen.on{display:flex;}
  .bar{display:flex;align-items:center;gap:10px;padding:max(10px,env(safe-area-inset-top)) 14px 6px;z-index:6;}
  .icobtn{background:var(--cream);width:48px;height:48px;border-radius:16px;box-shadow:var(--shadow-sm);
    font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .stars{margin-left:auto;background:var(--cream);border-radius:20px;box-shadow:var(--shadow-sm);
    font-weight:900;display:flex;align-items:center;gap:7px;padding:9px 15px;font-size:19px;}
  .bar .title{font-weight:900;font-size:clamp(17px,4.4vw,22px);color:var(--pink);}

  #field{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:2px 8px;position:relative;}
  #field svg.scene{width:100%;height:100%;max-height:100%;}
  #field .obj{cursor:pointer;}
  .tas{position:absolute;right:16px;bottom:16px;background:linear-gradient(180deg,#ff9cc0,#ff6fa1);
    border-radius:20px 20px 26px 26px;box-shadow:0 7px 0 #c4487261;padding:12px;z-index:5;}
  .tas::before{content:"";position:absolute;top:-19px;left:50%;transform:translateX(-50%);
    width:52px;height:24px;border:7px solid #e2568a;border-bottom:none;border-radius:26px 26px 0 0;}
  .tas::after{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    width:15px;height:15px;border-radius:50%;background:#ffd23f;box-shadow:0 2px 0 rgba(91,58,82,.25);}
  .tas .tasttl{font-weight:900;font-size:14px;color:#fff;text-align:center;margin-bottom:8px;
    text-shadow:0 1.5px 0 rgba(91,58,82,.28);}
  .tas .titems{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:158px;border:2.5px dashed rgba(255,255,255,.65);border-radius:18px;padding:8px;}
  .tas button{width:62px;height:62px;background:#fff;border-radius:16px;box-shadow:0 4px 0 rgba(91,58,82,.22);padding:7px;}
  .tas button svg{width:100%;height:100%;display:block;}
  .tas.hidden{display:none;}
  .progress{padding:2px 16px 6px;text-align:center;}
  .progress .lab{font-weight:800;color:var(--ink-soft);font-size:14px;margin-bottom:5px;}
  .track{height:18px;background:#fff;border-radius:12px;box-shadow:inset 0 2px 0 rgba(91,58,82,.08);overflow:hidden;max-width:520px;margin:0 auto;}
  .fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--lila));border-radius:12px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
  .menu{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:8px 14px max(14px,env(safe-area-inset-bottom));}
  .tile{position:relative;border-radius:20px;padding:11px 4px;color:#fff;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:3px;}
  .tile .bdg{position:absolute;top:-7px;right:-7px;min-width:26px;height:26px;padding:0 7px;border-radius:14px;background:#fff;
    color:#a8809c;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 rgba(91,58,82,.25);}
  .tile .bdg.af{background:#ffd23f;color:#7a5b10;font-size:15px;padding:0;width:26px;min-width:26px;}
  .gp{background:#fff;border-radius:14px;padding:5px 11px;font-weight:900;font-size:14px;color:#a8809c;
    box-shadow:var(--shadow-sm);white-space:nowrap;}
  .gp.af{background:#ffd23f;color:#7a5b10;}
  .gp:empty{display:none;}
  .nameinp{font-family:inherit;font-weight:900;font-size:20px;padding:12px 14px;border-radius:16px;
    border:3px solid #eadbe4;width:82%;text-align:center;color:var(--ink);background:#fff;outline:none;}
  .nameinp:focus{border-color:var(--pink);}
  .tile .ic{font-size:clamp(20px,4.6vw,30px);line-height:1;}
  .tile .t{font-size:clamp(11px,2.6vw,15px);font-weight:900;}
  .tile.z{background:linear-gradient(180deg,#ff9cc0,#ff6fa1);}
  .tile.r{background:linear-gradient(180deg,#b79cff,#8f6fe0);}
  .tile.t3{background:linear-gradient(180deg,#57d9b0,#33b892);}
  .tile.t4{background:linear-gradient(180deg,#ffb26b,#f28b3c);}
  .tile.t5{background:linear-gradient(180deg,#7fc9ff,#469fe6);}

  .wzgrid{display:grid;gap:6px;justify-content:center;margin-top:10px;}
  .wcell{width:clamp(32px,6.4vw,46px);height:clamp(32px,6.4vw,46px);border-radius:10px;background:#fff;
    box-shadow:0 4px 0 rgba(91,58,82,.14);font-weight:900;font-size:clamp(15px,3.2vw,21px);color:var(--ink);
    display:flex;align-items:center;justify-content:center;padding:0;}
  .wcell.wfound{background:#c8f2d6;box-shadow:0 4px 0 var(--mint);color:#2f9e63;}
  .wcell.sel{background:#ffe3ee;box-shadow:0 4px 0 var(--pink);}
  .wchips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px;}
  .wchip{background:#fff;border-radius:14px;padding:7px 12px;font-weight:900;box-shadow:var(--shadow-sm);font-size:15px;color:var(--ink);}
  .wchip.done{background:#c8f2d6;text-decoration:line-through;color:#2f9e63;}
  .gsvg{width:100%;max-width:600px;margin:6px auto 0;display:block;touch-action:manipulation;}
  .gsvg .dot,.gsvg .regio{cursor:pointer;}
  .pal{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
  .palb{width:62px;height:62px;border-radius:18px;box-shadow:0 5px 0 rgba(91,58,82,.22);font-weight:900;font-size:21px;color:#fff;
    display:flex;align-items:center;justify-content:center;border:4px solid transparent;text-shadow:0 1.5px 0 rgba(0,0,0,.22);}
  .palb.act{border-color:var(--ink);transform:scale(1.07);}
  .palb.done{opacity:.55;}
  .flash{font-size:clamp(50px,13vw,90px);font-weight:900;color:var(--ink);letter-spacing:2px;min-height:1.25em;line-height:1.25;}
  .rebusrow{display:flex;align-items:center;justify-content:center;gap:14px;font-size:clamp(44px,11vw,74px);line-height:1.15;}
  .rebusrow .plus{font-size:.5em;color:var(--ink-soft);font-weight:900;}

  .content{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;padding:6px 14px;overflow:auto;}
  .card{background:var(--cream);border-radius:32px;box-shadow:var(--shadow);padding:24px 20px;max-width:560px;width:100%;margin:0 auto;text-align:center;}
  .card h2{margin:2px 0 6px;font-size:clamp(20px,5vw,28px);font-weight:900;color:var(--pink);}
  .qbig{font-size:clamp(44px,12vw,84px);font-weight:900;margin:6px 0;line-height:1;color:var(--ink);}
  .qemoji{font-size:clamp(70px,19vw,128px);margin:4px 0;line-height:1;}
  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px;}
  .opt{border-radius:22px;background:#fff;color:var(--ink);box-shadow:0 6px 0 rgba(91,58,82,.16);
    padding:16px 6px;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .opt .m{font-size:clamp(26px,7vw,44px);font-weight:900;line-height:1;}
  .opt .sub{font-size:14px;font-weight:800;color:var(--ink-soft);}
  .opt.good{background:#c8f2d6;box-shadow:0 6px 0 var(--mint);}
  .opt.bad{background:#ffd6de;box-shadow:0 6px 0 var(--pink);animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
  .cheer{height:28px;margin-top:10px;font-weight:900;font-size:19px;color:var(--pink);}
  .region{font-weight:900;color:var(--pink);font-size:clamp(18px,4.6vw,24px);margin:2px 0 2px;}
  .regsub{font-weight:800;color:var(--ink-soft);font-size:14px;margin-bottom:8px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .cell{position:relative;background:#fff;border-radius:20px;box-shadow:var(--shadow-sm);
    padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .cell .ce{font-size:clamp(34px,8vw,52px);line-height:1;}
  .cell .cw{font-size:13px;font-weight:800;color:var(--ink-soft);}
  .cell.done{background:#c8f2d6;box-shadow:0 6px 0 var(--mint);}
  .cell.done:after{content:"✓";position:absolute;top:4px;right:9px;font-size:20px;font-weight:900;color:#2f9e63;}

  .overlay{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;
    background:rgba(91,58,82,.5);backdrop-filter:blur(3px);padding:18px;}
  .overlay.on{display:flex;}
  .panel{background:var(--cream);border-radius:34px;box-shadow:0 12px 0 rgba(91,58,82,.25);
    padding:26px 22px;max-width:460px;width:100%;text-align:center;}
  .panel h2{margin:6px 0 14px;font-size:clamp(22px,6vw,28px);font-weight:900;color:var(--pink);}
  .panel p{margin:0 0 14px;font-weight:800;color:var(--ink-soft);font-size:16px;}
  .panel .hintline{color:var(--ink);background:#fff;border-radius:16px;padding:10px 14px;font-size:15px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
  .panel>svg{width:200px;height:180px;display:block;margin:0 auto 4px;}
  .bigbtn{background:var(--pink);color:#fff;font-weight:900;font-size:20px;padding:16px 30px;border-radius:22px;
    box-shadow:0 7px 0 var(--pink-d);min-width:60%;}
  .bigbtn:active{box-shadow:0 3px 0 var(--pink-d);transform:translateY(4px);}
  .row{display:flex;gap:10px;justify-content:center;margin-top:6px;}
  .row .bigbtn{min-width:auto;flex:1;font-size:18px;padding:15px 14px;}
  .ghost{background:var(--cream);color:var(--pink);font-weight:900;box-shadow:var(--shadow-sm);}
  .ponypick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .pbtn{background:#fff;border-radius:22px;box-shadow:0 6px 0 rgba(91,58,82,.16);padding:10px 6px 12px;
    display:flex;flex-direction:column;align-items:center;gap:2px;}
  .pbtn svg{width:100%;height:88px;}
  .pbtn .pn{font-weight:900;font-size:15px;color:var(--ink);}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.05s!important;}}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<section class="screen on" id="home">
  <div class="bar">
    <button class="icobtn" id="resetBtn" title="Opnieuw">↺</button>
    <button class="icobtn" id="sndBtn" title="Geluid">🔈</button>
    <div class="title">Evy's manege 🐴</div>
    <div class="stars">⭐ <span id="starCount">0</span></div>
  </div>
  <div id="field">
    <div class="tas hidden" id="tas">
      <div class="tasttl">Mijn tas</div>
      <div class="titems" id="tasItems"></div>
    </div>
  </div>
  <div class="progress">
    <div class="lab" id="progLab"></div>
    <div class="track"><div class="fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="menu">
    <button class="tile z" data-game="zoek"><span class="ic">🔍</span><span class="t">Zoeken</span></button>
    <button class="tile r" data-game="reken"><span class="ic">➕</span><span class="t">Rekenen</span></button>
    <button class="tile t3" data-game="taal"><span class="ic">🔤</span><span class="t">Taal</span></button>
    <button class="tile t4" data-game="flits"><span class="ic">⚡</span><span class="t">Flitsen</span></button>
    <button class="tile t5" data-game="wz"><span class="ic">🧩</span><span class="t">Woordzoeker</span></button>
    <button class="tile z" data-game="stip"><span class="ic">💯</span><span class="t">Stippen</span></button>
    <button class="tile t4" data-game="kleur"><span class="ic">🎨</span><span class="t">Kleuren</span></button>
    <button class="tile r" data-game="rebus"><span class="ic">🤔</span><span class="t">Rebus</span></button>
  </div>
</section>

<section class="screen" id="play">
  <div class="bar">
    <button class="icobtn" id="backBtn">‹</button>
    <div class="title" id="playTitle">Spel</div>
    <span class="gp" id="gp"></span>
    <div class="stars">⭐ <span id="starCount2">0</span></div>
  </div>
  <div class="content" id="content"></div>
</section>

<div class="overlay" id="overlay"><div class="panel" id="panel"></div></div>

<script>
"use strict";
/* =================== PONY-KLEUREN =================== */
const P_PAL ={body:"#e0b06a",light:"#efcb92",shade:"#cf9d55",mane:"#f4e8cf",maneL:"#fffbf1",muzzle:"#f0d9b0",ear:"#f0d9b0",hoof:"#4a4038",bow:"#ff6fa1",bowD:"#d84f80"};
const P_VOS ={body:"#b06a37",light:"#c78551",shade:"#97562b",mane:"#8a4a22",maneL:"#a9663a",muzzle:"#d9a878",ear:"#d9a878",hoof:"#3d332e",bow:"#57d9b0",bowD:"#33b892"};
const P_WIT ={body:"#e7e2da",light:"#f6f3ee",shade:"#cfc8bd",mane:"#afa598",maneL:"#cfc7ba",muzzle:"#dcd6cc",ear:"#e8c9cf",hoof:"#4a4038",bow:"#b79cff",bowD:"#8f6fe0"};

/* =================== TEKENINGEN =================== */
function ponyPaths(p,saddle,crown){return `
  <g fill="${p.mane}"><circle cx="204" cy="120" r="16"/><circle cx="216" cy="138" r="15"/><circle cx="218" cy="160" r="14"/><circle cx="211" cy="181" r="13"/><circle cx="200" cy="196" r="11"/></g>
  <g fill="${p.maneL}" opacity=".8"><circle cx="208" cy="126" r="7"/><circle cx="216" cy="150" r="6"/><circle cx="210" cy="176" r="6"/></g>
  <rect x="176" y="150" width="20" height="52" rx="10" fill="${p.shade}"/><rect x="150" y="150" width="22" height="54" rx="11" fill="${p.body}"/>
  <rect x="112" y="150" width="20" height="52" rx="10" fill="${p.shade}"/><rect x="86" y="150" width="22" height="54" rx="11" fill="${p.body}"/>
  <g fill="${p.hoof}"><rect x="86" y="189" width="22" height="15" rx="7"/><rect x="112" y="187" width="20" height="14" rx="7"/><rect x="150" y="189" width="22" height="15" rx="7"/><rect x="176" y="187" width="20" height="14" rx="7"/></g>
  <ellipse cx="104" cy="120" rx="27" ry="42" transform="rotate(20 104 120)" fill="${p.body}"/>
  <ellipse cx="142" cy="138" rx="72" ry="49" fill="${p.body}"/><ellipse cx="150" cy="124" rx="48" ry="26" fill="${p.light}" opacity=".7"/>
  ${saddle?`
  <path d="M146 112 q6 34 4 48" stroke="#6f4522" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M116 100 q34 -22 68 -4 q-4 20 -34 22 q-28 1 -34 -18 z" fill="#8a5a2f"/>
  <path d="M124 96 q28 -15 52 -2" stroke="#a67139" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="150" cy="106" r="4" fill="#6f4522"/>`:""}
  <ellipse cx="74" cy="96" rx="43" ry="38" fill="${p.body}"/><ellipse cx="41" cy="112" rx="21" ry="17" fill="${p.muzzle}"/>
  <path d="M58 66 q-8 -28 10 -32 q9 15 4 32 z" fill="${p.body}"/><path d="M92 62 q6 -28 22 -24 q-1 17 -13 31 z" fill="${p.body}"/>
  <path d="M62 62 q-3 -17 9 -21 q4 10 1 21 z" fill="${p.ear}"/><path d="M96 58 q3 -17 14 -15 q-1 11 -7 21 z" fill="${p.ear}"/>
  <g fill="${p.mane}"><circle cx="98" cy="54" r="15"/><circle cx="108" cy="74" r="15"/><circle cx="112" cy="96" r="14"/><circle cx="108" cy="118" r="13"/><circle cx="99" cy="136" r="12"/></g>
  <g fill="${p.maneL}" opacity=".8"><circle cx="101" cy="58" r="6"/><circle cx="112" cy="90" r="6"/><circle cx="103" cy="126" r="5"/></g>
  <g fill="${p.mane}"><circle cx="84" cy="50" r="12"/><circle cx="72" cy="46" r="11"/><circle cx="63" cy="55" r="10"/></g>
  <circle cx="78" cy="49" r="4" fill="${p.maneL}" opacity=".8"/>
  <ellipse cx="60" cy="92" rx="8.5" ry="11" fill="#3a2f2a"/><circle cx="57" cy="88" r="3.2" fill="#fff"/>
  <path d="M49 81 q9 -8 20 -2" stroke="#3a2f2a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="58" cy="109" rx="9" ry="6" fill="#ff8fb3" opacity=".4"/>
  <ellipse cx="35" cy="110" rx="2.4" ry="3" fill="#7a5b4a"/><path d="M31 119 q11 9 22 1" stroke="#7a5b4a" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  ${crown?`<g transform="translate(80,33) rotate(-6)">
    <path d="M-13 7 L13 7 L10 -7 L5 1 L0 -10 L-5 1 L-10 -7 Z" fill="#ffd23f" stroke="#dfa32e" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="0" cy="-11.5" r="2.6" fill="#ff6fa1"/></g>`:""}
  <g transform="translate(103,44)"><path d="M0 0 L-17 -9 L-17 9 Z" fill="${p.bow}"/><path d="M0 0 L17 -9 L17 9 Z" fill="${p.bow}"/><path d="M0 0 L-12 -6 L-12 6 Z" fill="${p.bowD}"/><path d="M0 0 L12 -6 L12 6 Z" fill="${p.bowD}"/><circle cx="0" cy="0" r="5.5" fill="${p.bowD}"/></g>`;}
const shad=(rx)=>`<ellipse cx="0" cy="-5" rx="${rx}" ry="${rx*0.16}" fill="#3f5a2f" opacity=".15"/>`;
const ponyLocal=(p,saddle,crown)=>shad(66)+`<g transform="translate(-128,-206)">${ponyPaths(p,saddle,crown)}</g><circle cx="0" cy="-100" r="108" fill="rgba(0,0,0,0)"/>`;

function carrot(x,y,r,c){return `<g transform="translate(${x},${y}) rotate(${r})"><path d="M0 0 L38 6 L38 -6 Z" fill="${c}"/><g stroke="#4faa3a" stroke-width="4" stroke-linecap="round"><line x1="38" y1="0" x2="50" y2="-9"/><line x1="38" y1="0" x2="52" y2="0"/><line x1="38" y1="0" x2="50" y2="9"/></g></g>`;}
function wortelsIcon(){return `<g transform="translate(0,14)">${carrot(-24,-6,-18,"#ef8a34")}${carrot(-6,-14,6,"#f29b4b")}${carrot(-18,-22,28,"#ef8a34")}</g>`;}
function wortelsPreview(){return shad(50)+`<g transform="translate(0,-26) scale(1.5)">${wortelsIcon()}</g>`;}
function borstelCore(){return `
  <g transform="rotate(-10)">
  <rect x="-40" y="-40" width="80" height="24" rx="12" fill="#d98a4a"/>
  <ellipse cx="0" cy="-40" rx="27" ry="7" fill="#e8a86f"/>
  <rect x="-34" y="-18" width="68" height="11" rx="4" fill="#8f79cf"/>
  <g stroke="#6f59b0" stroke-width="3" stroke-linecap="round"><line x1="-26" y1="-7" x2="-26" y2="2"/><line x1="-12" y1="-7" x2="-12" y2="4"/><line x1="2" y1="-7" x2="2" y2="2"/><line x1="16" y1="-7" x2="16" y2="4"/><line x1="28" y1="-7" x2="28" y2="2"/></g></g>`;}
function borstelIcon(){return `<g transform="translate(0,10) scale(.9)">${borstelCore()}</g>`;}
function borstelPreview(){return shad(46)+`<g transform="translate(0,-34) scale(1.4)">${borstelCore()}</g>`;}
function drinkbak(){return shad(48)+`

      const hor=Math.random()<.5;
      const r=hor?randi(0,size-1):randi(0,size-w.length);
      const c=hor?randi(0,size-w.length):randi(0,size-1);
      let fits=true;
      for(let i=0;i<w.length;i++){const rr=hor?r:r+i, cc=hor?c+i:c;
        if(grid[rr][cc]&&grid[rr][cc]!==w[i]){fits=false;break;}}
      if(!fits) continue;
      const cells=[];
      for(let i=0;i<w.length;i++){const rr=hor?r:r+i, cc=hor?c+i:c; grid[rr][cc]=w[i]; cells.push(rr+"_"+cc);}
      placed.push({w,cells});
      break;
    }
  }
  const AL="AABDEEGHIJKLMNOOPRSTUVWZ";
  for(let r=0;r<size;r++)for(let c=0;c<size;c++) if(!grid[r][c]) grid[r][c]=AL[randi(0,AL.length-1)];
  return {size,grid,placed,found:[],sel:null};
}
function renderWZ(){
  if(!wz||wz.found.length===wz.placed.length) wz=buildWZ();
  const g=wz; let cells="";
  for(let r=0;r<g.size;r++)for(let c=0;c<g.size;c++){
    const id=r+"_"+c;
    const done=g.placed.some(p=>g.found.includes(p.w)&&p.cells.includes(id));
    cells+=`<button class="wcell ${done?'wfound':''}${g.sel===id?' sel':''}" data-id="${id}">${g.grid[r][c]}</button>`;
  }
  const chips=g.placed.map(p=>`<span class="wchip ${g.found.includes(p.w)?'done':''}">${p.w}</span>`).join("");
  $("content").innerHTML=`<div class="card"><h2>Zoek de woorden!</h2>
    <p style="margin:0;font-weight:800;color:var(--ink-soft);font-size:14px">Tik op de eerste en de laatste letter van een woord.</p>
    <div class="wzgrid" style="grid-template-columns:repeat(${g.size},auto)" id="wzg">${cells}</div>
    <div class="wchips">${chips}</div><div class="cheer" id="ch"></div></div>`;
  $("wzg").querySelectorAll(".wcell").forEach(b=>b.onclick=()=>wzTap(b.dataset.id));
}
function wzTap(id){
  ac(); const g=wz;
  if(!g.sel){ g.sel=id; renderWZ(); return; }
  if(g.sel===id){ g.sel=null; renderWZ(); return; }
  const hit=g.placed.find(p=>!g.found.includes(p.w)&&
    ((p.cells[0]===g.sel&&p.cells[p.cells.length-1]===id)||(p.cells[0]===id&&p.cells[p.cells.length-1]===g.sel)));
  g.sel=null;
  if(hit){
    g.found.push(hit.w); sGood(); renderWZ(); $("ch").textContent="Goed zo! ⭐"; awardStar(); bumpProg("wz");
    if(g.found.length===g.placed.length){
      const nieuw=()=>panelMsg("🧩","Alles gevonden!","Wil je nog een woordzoeker doen?","Nieuwe puzzel",()=>{closeOverlay(); wz=null; if(mode==="wz")renderWZ();});
      setTimeout(()=>{ if($("overlay").classList.contains("on")){const t=setInterval(()=>{if(!$("overlay").classList.contains("on")){clearInterval(t);if(mode==="wz")nieuw();}},300);} else nieuw(); },800);
    }
  } else {
    sNope(); renderWZ();
    const el=$("wzg"); el.style.animation="shake .35s"; setTimeout(()=>el.style.animation="",380);
  }
}

function thin(pts,minD){
  const out=[pts[0]];
  for(let i=1;i<pts.length;i++){ const a=out[out.length-1],p=pts[i];
    if(Math.hypot(p[0]-a[0],p[1]-a[1])>=minD) out.push(p); }
  while(out.length>2 && Math.hypot(out[0][0]-out[out.length-1][0],out[0][1]-out[out.length-1][1])<minD) out.pop();
  return out;
}
function starPts(){const P=[];for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5;const rr=i%2?58:138;P.push([300+rr*Math.cos(a),200+rr*Math.sin(a)]);}return P;}
function heartPts(){const P=[];for(let i=0;i<26;i++){const t=Math.PI*2*i/26;
  const x=16*Math.pow(Math.sin(t),3), y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  P.push([300+x*9.4, 195-y*9.4]);}return thin(P,40);}
function tulpPts(){return [[230,250],[218,160],[240,120],[262,168],[300,108],[338,168],[360,120],[382,160],[370,250],[330,282],[270,282]];}
function fishPts(){return [[75,200],[135,140],[225,112],[320,112],[398,150],[430,180],[492,132],[522,200],[492,268],[430,220],[398,250],[320,288],[225,288],[135,260]];}
